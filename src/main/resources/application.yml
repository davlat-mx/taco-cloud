spring:
  application:
    name: taco-cloud

  thymeleaf:
    cache: false

  datasource:
    generate-unique-name: false
    name: tacocloud

  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: <facebook client id>
            client-secret: <facebook client secret>
            scope:
              - email,
              - public_profile

taco:
  orders:
    pageSize: 10

logging:
  file:
    path: /var/logs
    file: TacoCloud.log
  level:
    root: WARN
    org:
      springframework:
        security: DEBUG

